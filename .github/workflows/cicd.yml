  name: CI Rally Backend API

  on:
    push:
      tags:
        - 'v*'  # Tag push → production
      branches:
        - staging  # Branch push → staging
    workflow_dispatch:

  jobs:
    # 1️⃣ BUILD
    build:
      name: Build Go Project
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
          with:
            fetch-depth: 0  # full history + tags so `git describe` works for staging versions

        - name: Set up Go
          uses: actions/setup-go@v5
          with:
            go-version: 1.24

        - name: Cache Go modules
          uses: actions/cache@v4
          with:
            path: |
              ~/.cache/go-build
              ~/go/pkg/mod
            key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
            restore-keys: |
              ${{ runner.os }}-go-

        - name: Install swag CLI
          run: go install github.com/swaggo/swag/cmd/swag@latest

        - name: Generate Swagger docs
          run: swag init -g cmd/server/main.go -o api/docs

        # - name: Run tests (if any)
        #   run: go test ./...

        - name: Build binary
          run: |
            # Extract version info
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              VERSION="${GITHUB_REF#refs/tags/}"            # prod: exact tag, e.g. v0.0.3
            else
              # staging/dev: <last-tag>-<commits-since>-g<sha>, e.g. v0.0.2-5-gabc1234
              VERSION="$(git describe --tags --always)"
            fi
            COMMIT_SHA="${GITHUB_SHA::7}"
            BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

            echo "Building version: ${VERSION}, commit: ${COMMIT_SHA}, time: ${BUILD_TIME}"

            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -v \
              -ldflags "-X github.com/Hoi-Trang-Huynh/rally-backend-api/internal/version.Version=${VERSION} \
                        -X github.com/Hoi-Trang-Huynh/rally-backend-api/internal/version.CommitSHA=${COMMIT_SHA} \
                        -X github.com/Hoi-Trang-Huynh/rally-backend-api/internal/version.BuildTime=${BUILD_TIME}" \
              -o cmd/server/server ./cmd/server

        - name: Verify binary
          run: |
            ls -lh cmd/server/server
            file cmd/server/server

        - name: Upload build artifacts
          uses: actions/upload-artifact@v4
          with:
            name: go-binary
            path: cmd/server/server

    # 2️⃣ PUSH IMAGE
    push:
      name: Build & Push Docker Image
      runs-on: ubuntu-latest
      needs: build
      environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
      permissions:
        contents: read
        id-token: write

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Download build artifacts
          uses: actions/download-artifact@v4
          with:
            name: go-binary
            path: cmd/server
            
        - name: List files
          run: |
            echo "=== Build context contents ==="
            ls -la
            echo "=== cmd/server contents ==="
            ls -la cmd/server/

        - name: Authenticate to Google Cloud (OIDC)
          uses: google-github-actions/auth@v2
          with:
            workload_identity_provider: ${{ vars.WIF_PROVIDER }}
            service_account: ${{ vars.SA_EMAIL }}

        - name: Configure Docker for Artifact Registry
          run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

        - name: Build Docker image
          run: |
            IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.IMAGE_NAME }}/${{ vars.IMAGE_NAME }}"
            COMMIT_TAG="${GITHUB_SHA::7}"

            # Build with commit tag and latest
            docker build -t "$IMAGE:latest" -t "$IMAGE:$COMMIT_TAG" .

            # If this is a version tag, also tag with version
            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              VERSION_TAG="${GITHUB_REF#refs/tags/}"
              docker tag "$IMAGE:latest" "$IMAGE:$VERSION_TAG"
              echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
            fi

            echo "IMAGE_FULL=$IMAGE:$COMMIT_TAG" >> $GITHUB_ENV

        - name: Ensure GAR repository exists
          run: |
            gcloud artifacts repositories describe ${{ vars.IMAGE_NAME }} \
              --location=${{ vars.GCP_REGION }} \
              --project=${{ vars.GCP_PROJECT_ID }} \
              || gcloud artifacts repositories create ${{ vars.IMAGE_NAME }} \
              --repository-format=docker \
              --location=${{ vars.GCP_REGION }} \
              --description="Docker repository for ${{ vars.IMAGE_NAME }} images"

        - name: Push Docker image
          run: |
            IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.IMAGE_NAME }}/${{ vars.IMAGE_NAME }}"
            docker push "$IMAGE:latest"
            docker push "$IMAGE:${GITHUB_SHA::7}"

            # Push version tag if exists
            if [[ -n "$VERSION_TAG" ]]; then
              docker push "$IMAGE:$VERSION_TAG"
            fi

        - name: Upload image info
          run: echo "$IMAGE_FULL" > image.txt

        - uses: actions/upload-artifact@v4
          with:
            name: image-info
            path: image.txt

    # 3️⃣ DEPLOY
    deploy:
      name: Deploy to Cloud Run
      runs-on: ubuntu-latest
      needs: push
      environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
      permissions:
        contents: read
        id-token: write

      steps:
        - name: Download image info
          uses: actions/download-artifact@v4
          with:
            name: image-info

        - name: Authenticate to Google Cloud (OIDC)
          uses: google-github-actions/auth@v2
          with:
            workload_identity_provider: ${{ vars.WIF_PROVIDER }}
            service_account: ${{ vars.SA_EMAIL }}

        - name: Deploy to Cloud Run
          run: |
            IMAGE_FULL=$(cat image.txt)
            gcloud run deploy ${{ vars.SERVICE_NAME }} \
              --service-account=${{ vars.SA_EMAIL }} \
              --image="$IMAGE_FULL" \
              --region=${{ vars.GCP_REGION }} \
              --project=${{ vars.GCP_PROJECT_ID }} \
              --platform=managed \
              --allow-unauthenticated \
              --port=8080 \
              --memory=512Mi \
              --max-instances=5 \
              --set-env-vars=ENV=${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }} \
              --set-secrets=MONGODB_URI=MONGODB_URI:latest,MONGODB_DB=MONGODB_DB:latest,CLOUDINARY_URL=CLOUDINARY_URL:latest \
              --quiet

    # 4️⃣ NOTIFY
    notify:
      name: Notify MS Teams
      runs-on: ubuntu-latest
      needs: [build, push, deploy]
      if: always()
      steps:
        - name: Determine Status
          id: status
          run: |
            if [[ "${{ needs.build.result }}" == "failure" || "${{ needs.push.result }}" == "failure" || "${{ needs.deploy.result }}" == "failure" ]]; then
              echo "status=Failure" >> $GITHUB_OUTPUT
              echo "color=Attention" >> $GITHUB_OUTPUT # Red
            else
              echo "status=Success" >> $GITHUB_OUTPUT
              echo "color=Good" >> $GITHUB_OUTPUT # Green
            fi

        - name: Send Notification
          run: |
            # Construct JSON Payload
            cat <<EOF > payload.json
            {
              "type": "message",
              "attachments": [
                {
                  "contentType": "application/vnd.microsoft.card.adaptive",
                  "content": {
                    "type": "AdaptiveCard",
                    "version": "1.2",
                    "body": [
                      {
                        "type": "TextBlock",
                        "text": "GitHub Actions Notification",
                        "weight": "Bolder",
                        "size": "Medium"
                      },
                      {
                        "type": "TextBlock",
                        "text": "Workflow: ${{ github.workflow }}",
                        "isSubtle": true,
                        "wrap": true
                      },
                      {
                        "type": "FactSet",
                        "facts": [
                          { "title": "Status:", "value": "${{ steps.status.outputs.status }}" },
                          { "title": "Repository:", "value": "${{ github.repository }}" },
                          { "title": "Branch:", "value": "${{ github.ref_name }}" },
                          { "title": "Commit:", "value": "${{ github.sha }}" }
                        ]
                      },
                      {
                        "type": "TextBlock",
                        "text": "Job Statuses:",
                        "weight": "Bolder",
                        "spacing": "Medium"
                      },
                      {
                        "type": "FactSet",
                        "facts": [
                          { "title": "Build:", "value": "${{ needs.build.result }}" },
                          { "title": "Push:", "value": "${{ needs.push.result }}" },
                          { "title": "Deploy:", "value": "${{ needs.deploy.result }}" }
                        ]
                      }
                    ],
                    "actions": [
                      {
                        "type": "Action.OpenUrl",
                        "title": "View Run",
                        "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                      }
                    ],
                    "msteams": {
                      "width": "Full"
                    }
                  }
                }
              ]
            }
            EOF
            
            # Send to Teams
            curl -H "Content-Type: application/json" -d @payload.json "${{ secrets.MS_TEAMS_WEBHOOK_URL }}"
